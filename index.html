<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>타자 연습</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>⌨️ 타자 연습</h1>

    <div id="text"></div>

    <textarea id="input" placeholder="여기에 입력하세요..." rows="5"></textarea>

    <div class="info">
        <p>시간: <span id="time">60</span>초</p>
        <p>정확도: <span id="accuracy">100</span>%</p>
    </div>

    <button onclick="startGame()">다시 시작</button>
</div>

<script src="script.js"></script>
</body>
</html>
